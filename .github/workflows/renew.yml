name: Katabump 自动续期

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      ENABLE_RECORDING:
        description: "是否开启录屏（true/false）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb ffmpeg curl unzip \
            fonts-noto-cjk \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      - name: 安装 Python 依赖
        run: |
          pip install -r requirements.txt
          python -c "from cloakbrowser import ensure_binary; ensure_binary()"
          python -c "from cloakbrowser.geoip import _ensure_geoip_db; _ensure_geoip_db()"

      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/download/v25.5.16/Xray-linux-64.zip -o xray.zip
          unzip xray.zip && chmod +x xray
          echo "$V2RAY_CONFIG" > config.json
          ./xray run -c config.json &
          sleep 5
          echo "直连 IP："
          curl -s --max-time 5 ifconfig.me || echo "(超时)"
          echo ""
          echo "代理 IP："
          curl -s --max-time 5 --socks5 127.0.0.1:10808 ifconfig.me || echo "(代理超时，请检查 V2RAY_CONFIG)"
          echo ""

      - name: 运行续期
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
          DISPLAY: ":99"
          LIBGL_ALWAYS_SOFTWARE: "1"
          GALLIUM_DRIVER: "llvmpipe"
          ENABLE_RECORDING: ${{ github.event.inputs.ENABLE_RECORDING }}
        run: |
          if [ "$ENABLE_RECORDING" = "true" ]; then
            DO_RECORD=true
            echo "📹 录屏已开启"
          else
            DO_RECORD=false
            echo "📹 录屏已关闭"
          fi

          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          XVFB_PID=$!
          sleep 2
          DISPLAY=:99 xdpyinfo > /dev/null 2>&1 && echo "Xvfb 就绪" || echo "Xvfb 启动异常"

          RECORD_PID=""
          if [ "$DO_RECORD" = "true" ]; then
            ffmpeg -f x11grab -video_size 1280x720 -framerate 15 -i :99 \
              -codec:v libx264 -preset ultrafast -crf 28 \
              -pix_fmt yuv420p -movflags +faststart /tmp/recording.mp4 \
              > /tmp/ffmpeg.log 2>&1 &
            RECORD_PID=$!
            sleep 3
            echo "录屏 PID: $RECORD_PID"
          fi

          timeout 270 python -u action_renew.py || echo "脚本退出码: $?"

          echo "=== 截图目录 ==="
          ls -la ./screenshots/ || echo "(无截图)"

          if [ -n "$RECORD_PID" ]; then
            sleep 2
            kill $RECORD_PID 2>/dev/null || true
            wait $RECORD_PID 2>/dev/null || true
            stat -c"录像大小: %s bytes" /tmp/recording.mp4 2>/dev/null || true
          fi
          kill $XVFB_PID 2>/dev/null || true

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: ./screenshots/*.png
          if-no-files-found: ignore
          retention-days: 3

      - name: 上传录屏
        if: always() && github.event.inputs.ENABLE_RECORDING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: recording-${{ github.run_number }}
          path: |
            /tmp/recording.mp4
            /tmp/ffmpeg.log
          if-no-files-found: ignore
          retention-days: 3

  cleanup:
    runs-on: ubuntu-latest
    needs: renew
    if: always()
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: 删除旧 runs，保留最新 2 个
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW="renew.yml"
          WORKFLOW_ID=$(gh api "repos/${REPO}/actions/workflows" \
            --jq ".workflows[] | select(.path | endswith(\"${WORKFLOW}\")) | .id")
          if [ -z "$WORKFLOW_ID" ]; then echo "未找到 workflow，跳过"; exit 0; fi
          RUN_IDS=$(gh api \
            "repos/${REPO}/actions/workflows/${WORKFLOW_ID}/runs?per_page=100" \
            --jq '.workflow_runs | sort_by(.run_number) | reverse | .[2:] | .[].id')
          if [ -z "$RUN_IDS" ]; then echo "无需清理"; exit 0; fi
          for RUN_ID in $RUN_IDS; do
            echo "删除 run: $RUN_ID"
            gh api -X DELETE "repos/${REPO}/actions/runs/${RUN_ID}" || echo "跳过 $RUN_ID"
          done
          echo "✅ 清理完成"
