name: Katabump 自动续期

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      ENABLE_RECORDING:
        description: "是否开启录屏（true/false）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update -qq
          curl -fsSL https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -o /tmp/chrome.deb
          sudo apt-get install -y -qq /tmp/chrome.deb
          sudo apt-get install -y -qq xvfb curl ffmpeg unzip

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 下载并启动 Xray 代理
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          curl -sL https://github.com/XTLS/Xray-core/releases/download/v25.5.16/Xray-linux-64.zip -o xray.zip
          unzip xray.zip && chmod +x xray
          echo "$V2RAY_CONFIG" > config.json
          ./xray run -c config.json &
          sleep 5
          echo "直连 IP："
          curl -s --max-time 5 ifconfig.me || echo "(超时)"
          echo ""
          echo "代理 IP："
          curl -s --max-time 5 --socks5 127.0.0.1:10808 ifconfig.me || echo "(代理超时，请检查 V2RAY_CONFIG)"
          echo ""

      - name: 修复 DNS
        run: |
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          printf 'nameserver 1.1.1.1\nnameserver 8.8.8.8\n' | sudo tee /etc/resolv.conf
          sudo chattr +i /etc/resolv.conf 2>/dev/null || true
          sleep 2

      - name: 运行续期（带录屏）
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          WXPUSHER_APP_TOKEN: ${{ secrets.WXPUSHER_APP_TOKEN }}
          WXPUSHER_UID: ${{ secrets.WXPUSHER_UID }}
          HTTP_PROXY: "socks5://127.0.0.1:10808"
          HEADLESS: "false"
          DISPLAY: ":99"
          ENABLE_RECORDING: ${{ github.event.inputs.ENABLE_RECORDING || 'false' }}
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 +extension RANDR &
          sleep 1
          if [ "$ENABLE_RECORDING" = "true" ]; then
            ffmpeg -f x11grab -video_size 1280x720 -i :99 \
              -codec:v libx264 -preset ultrafast -crf 30 -t 180 \
              -movflags +faststart -y /tmp/recording.mp4 &
            RECORD_PID=$!
            sleep 1
          fi
          timeout 150 python action_renew.py || echo "[EXIT] $?"
          if [ "$ENABLE_RECORDING" = "true" ]; then
            kill -INT $RECORD_PID 2>/dev/null || true
            for i in $(seq 1 10); do
              kill -0 $RECORD_PID 2>/dev/null || break
              sleep 1
            done
            kill -9 $RECORD_PID 2>/dev/null || true
            wait $RECORD_PID 2>/dev/null || true
            ls -la /tmp/recording.mp4 || true
          fi
          pkill Xvfb 2>/dev/null || true

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./screenshots/
          if-no-files-found: ignore
          retention-days: 3

      - name: 上传录屏
        if: always() && github.event.inputs.ENABLE_RECORDING == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: recording
          path: /tmp/recording.mp4
          if-no-files-found: ignore
          retention-days: 3

  cleanup:
    runs-on: ubuntu-latest
    needs: renew
    if: always()
    permissions:
      actions: write
    steps:
      - name: 删除旧的 workflow runs，保留最新 2 个
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'renew.yml',
              per_page: 100,
            });
            const toDelete = runs.slice(2);
            for (const run of toDelete) {
              await github.rest.actions.deleteWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: run.id,
              });
              console.log(`Deleted run #${run.run_number} (id: ${run.id})`);
            }
